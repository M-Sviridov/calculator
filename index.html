<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>


<body>
    <div class="calculator-container">
        <div class="header">
            <div id="red-button"></div>
            <div id="yellow-button"></div>
            <div id="green-button"></div>
        </div>
        <div id="display">0</div>
        <div class="main-numpad" id="dot-button">.</div>
        <div class="main-numpad" id="zero-button">0</div>
        <div class="main-numpad" id="one-button">1</div>
        <div class="main-numpad" id="two-button">2</div>
        <div class="main-numpad" id="three-button">3</div>
        <div class="main-numpad" id="four-button">4</div>
        <div class="main-numpad" id="five-button">5</div>
        <div class="main-numpad" id="six-button">6</div>
        <div class="main-numpad" id="seven-button">7</div>
        <div class="main-numpad" id="eight-button">8</div>
        <div class="main-numpad" id="nine-button">9</div>
        <div class="operators" id="multiplication-button">×</div>
        <div class="operators" id="division-button">÷</div>
        <div class="operators" id="substraction-button">−</div>
        <div class="operators" id="addition-button">+</div>
        <div class="operators" id="equal-button">=</div>
        <div class="others" id='ac-button'>AC</div>
        <div class="others" id='plus-minus-button'>±</div>
        <div class="others" id='backspace-button'>⌫</div>
    </div>

</body>

<script src="main.js"></script>

</html>
